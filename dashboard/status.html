<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nata AI Chat · Status</title>
  <link rel="icon" href="https://www.nata.co.nz/cdn/shop/files/top_logo.png?v=1613715845&width=32" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf8f0;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #1c1008;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative ambient glows */
    body::before {
      content: '';
      position: fixed;
      top: -180px; right: -180px;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(200,120,26,0.10) 0%, transparent 68%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -180px; left: -180px;
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(61,35,20,0.07) 0%, transparent 68%);
      pointer-events: none;
    }

    /* ── Main card ── */
    .card {
      background: #ffffff;
      border: 1px solid #e8d5b5;
      border-radius: 28px;
      padding: 48px 44px 40px;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(61,35,20,0.09), 0 2px 6px rgba(61,35,20,0.05);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* ── Logo & identity ── */
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: contain;
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 6px 16px rgba(61,35,20,0.18));
      transition: transform 0.3s ease;
    }
    .logo:hover { transform: scale(1.05); }

    .brand-name {
      font-size: 21px;
      font-weight: 700;
      color: #3d2314;
      letter-spacing: -0.015em;
    }
    .brand-sub {
      font-size: 12.5px;
      color: #8a6545;
      margin-top: 3px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Status pill ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      color: #15803d;
      padding: 7px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin: 18px 0;
      letter-spacing: 0.01em;
    }
    .status-pill.degraded  { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .status-pill.offline   { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 2.2s ease-in-out infinite;
    }
    .status-pill.degraded .status-dot  { background: #f59e0b; }
    .status-pill.offline .status-dot   { background: #ef4444; animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid #e8d5b5;
      margin: 22px 0;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: #fdf8f0;
      border: 1px solid #e8d5b5;
      border-radius: 18px;
      padding: 18px 16px 14px;
      text-align: left;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .stat-card:hover {
      border-color: #c8781a;
      box-shadow: 0 4px 12px rgba(200,120,26,0.10);
    }

    .stat-icon {
      font-size: 22px;
      display: block;
      margin-bottom: 10px;
      line-height: 1;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #3d2314;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      transition: opacity 0.3s;
    }
    .stat-value.loading { opacity: 0.25; }

    .stat-label {
      font-size: 10.5px;
      color: #8a6545;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }

    /* ── Uptime row ── */
    .info-row {
      background: #fdf8f0;
      border: 1px solid #e8d5b5;
      border-radius: 14px;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .info-row-label {
      font-size: 11.5px;
      color: #8a6545;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .info-row-value {
      font-size: 13px;
      color: #3d2314;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── CTA button ── */
    .btn-wrap {
      margin-top: 26px;
    }
    .btn-dashboard {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, #3d2314 0%, #2a1a0e 100%);
      color: #ffffff;
      text-decoration: none;
      padding: 15px 36px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.2s ease;
      box-shadow: 0 4px 18px rgba(61,35,20,0.28);
    }
    .btn-dashboard:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 28px rgba(61,35,20,0.38);
    }
    .btn-dashboard:active { transform: scale(0.97); }

    .btn-dashboard svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
      transition: transform 0.2s ease;
    }
    .btn-dashboard:hover svg { transform: translateX(3px); }

    /* ── Footer ── */
    .footer {
      margin-top: 22px;
      font-size: 11px;
      color: #8a6545;
      letter-spacing: 0.03em;
    }
    .footer a {
      color: #c8781a;
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover { text-decoration: underline; }

    /* ── Refresh hint ── */
    .refresh-hint {
      margin-top: 10px;
      font-size: 10.5px;
      color: #b89070;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; border-radius: 20px; }
      .stats-grid { gap: 10px; }
      .stat-value { font-size: 26px; }
    }
  </style>
</head>
<body>

<div class="card">

  <a href="https://nata.co.nz" target="_blank" rel="noopener">
    <img class="logo"
         src="https://www.nata.co.nz/cdn/shop/files/top_logo.png?v=1613715845&width=150"
         alt="Nata Portuguese Bakery" />
  </a>

  <div class="brand-name">Nata Portuguese Bakery</div>
  <div class="brand-sub">AI Chat Assistant</div>

  <div class="status-pill" id="status-pill">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Checking…</span>
  </div>

  <hr class="divider" />

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-icon">💬</span>
      <div class="stat-value loading" id="s-msgs-today">—</div>
      <div class="stat-label">Messages Today</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">📨</span>
      <div class="stat-value loading" id="s-total-msgs">—</div>
      <div class="stat-label">Total Messages</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">👥</span>
      <div class="stat-value loading" id="s-sessions">—</div>
      <div class="stat-label">Chat Sessions</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">⏱️</span>
      <div class="stat-value loading" id="s-uptime">—</div>
      <div class="stat-label">Hours Online</div>
    </div>
  </div>

  <div class="info-row">
    <span class="info-row-label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Last refreshed
    </span>
    <span class="info-row-value" id="last-refresh">—</span>
  </div>

  <div class="info-row">
    <span class="info-row-label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      API Endpoint
    </span>
    <span class="info-row-value" id="api-url">—</span>
  </div>

  <div class="btn-wrap">
    <a class="btn-dashboard" href="/dashboard">
      Open Dashboard
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>

  <div class="footer">
    Powered by AI ·
    <a href="https://nata.co.nz" target="_blank" rel="noopener">nata.co.nz</a>
  </div>
  <div class="refresh-hint" id="refresh-hint">Auto-refreshes every 30 seconds</div>

</div>

<script>
  function fmt(n) {
    return (typeof n === 'number') ? n.toLocaleString() : '—';
  }

  function fmtUptime(seconds) {
    if (!seconds && seconds !== 0) return '—';
    var h = Math.floor(seconds / 3600);
    return h < 1 ? '<1' : String(h);
  }

  function fmtTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function setVal(id, v) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = v;
    el.classList.remove('loading');
  }

  function setStatus(online) {
    var pill = document.getElementById('status-pill');
    var dot  = document.getElementById('status-dot');
    var txt  = document.getElementById('status-text');
    pill.className = 'status-pill' + (online ? '' : ' offline');
    if (dot) dot.style.background = online ? '' : '#ef4444';
    if (txt) txt.textContent = online ? 'All Systems Operational' : 'Service Unavailable';
  }

  function loadStats() {
    fetch('/api/public-stats')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(d) {
        setStatus(true);
        setVal('s-msgs-today',  fmt(d.messages_today));
        setVal('s-total-msgs',  fmt(d.total_messages));
        setVal('s-sessions',    fmt(d.total_sessions));
        setVal('s-uptime',      fmtUptime(d.uptime_seconds));
        setVal('last-refresh',  fmtTime(new Date()));
      })
      .catch(function() {
        setStatus(false);
        setVal('last-refresh', 'Failed — retrying…');
      });
  }

  // Show current API origin
  document.getElementById('api-url').textContent = window.location.host;

  loadStats();
  setInterval(loadStats, 30000);
</script>
</body>
</html>
